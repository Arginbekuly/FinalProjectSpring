spring:
  application:
    name: Theory-Conspiracy-Validator

  datasource:
    url: jdbc:postgresql://postgres:5432/theory
    username: theories
    password: secret

  jpa:
    hibernate:
      ddl-auto: update

  flyway:
    enabled: true

  jwt:
    secret: ${JWT_SECRET_KEY}
    expiration-ms: 86400000