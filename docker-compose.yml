services:

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/theory
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-theories}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-secret}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-bXktZGV2ZWxvcG1lbnQtand0LXNlY3JldC1rZXktZm9yLWRvY2tlci0zMi1ieXRlcw==}
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: theory
      POSTGRES_USER: ${DB_USER:-theories}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-theories} -d theory" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
